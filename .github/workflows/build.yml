
on: #[push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: setup Go
        # https://github.com/actions/setup-go/
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      # https://github.com/actions/checkout/
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - run: make style
      - run: make vet
      - run: make test
      - run: make BRANCH=${{ github.head_ref || github.ref_name }} build
      
      
      - run: make integ